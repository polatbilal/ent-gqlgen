type FinanceAccount {
  id: Int
  Name: String
  TcNo: String
  TaxNo: String
  TaxAdmin: String
  Phone: String
  Email: String
  Address: String
  Note: String
  Company: CompanyDetail
  FinanceRelations: [FinanceRelations]
}

type FinanceOperation {
  id: Int
  Name: String
  OperationDate: Time
  Debit: Decimal
  Credit: Decimal
  Description: String
  Company: CompanyDetail
  FinanceRelations: [FinanceRelations]
}

type CompanyPersonnel {
  id: Int
  Name: String
  TcNo: String
  Phone: String
  Email: String
  Address: String
  Note: String
  Company: CompanyDetail
  FinanceRelations: [FinanceRelations]
}

type FinanceRelations {
  id: Int
  FinanceAccount: FinanceAccount
  FinanceOperation: FinanceOperation
  CompanyPersonnel: CompanyPersonnel
  JobOwner: JobOwner
  CompanyEngineer: CompanyEngineer
  Company: CompanyDetail
}
