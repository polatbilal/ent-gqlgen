type JobBatchResult {
  job: JobDetail
  owner: JobOwner
  contractor: JobContractor
  author: JobAuthor
  supervisor: JobSupervisor
  engineer: JobEngineer
  progress: JobProgress
  company: CompanyDetail
}

type CompanyBatchResult {
  company: CompanyDetail
  companyToken: CompanyToken
}

type JobBulkError {
  yibfNo: Int!
  error: String!
}

type JobBulkResult {
  successful: [JobBatchResult!]!
  failed: [JobBulkError!]!
}

input JobBatchInput {
  YibfNo: Int!
  jobInput: JobInput
  jobStartDateInput: JobStartDateInput
  ownerInput: JobOwnerInput
  contractorInput: JobContractorInput
  authorInput: JobAuthorInput
  supervisorInput: JobSupervisorInput
  engineerInput: JobEngineerInput
}

input CompanyBatchInput {
  CompanyCode: Int!
  companyInput: CompanyDetailInput
  companyTokenInput: CompanyTokenInput
}

extend type Query {
  jobBatchQuery(yibfNo: Int, state: String): [JobBatchResult!]!
    @goField(forceResolver: true)
    @auth
}

extend type Mutation {
  jobBatchMutation(inputs: [JobBatchInput!]!): JobBulkResult!
    @goField(forceResolver: true)
    @auth

  executeBatchMutation(input: JobBatchInput!): JobBatchResult!
    @goField(forceResolver: true)
    @auth

  deleteBatchMutation(yibfNo: Int!): JobBatchResult!
    @goField(forceResolver: true)
    @auth
}
